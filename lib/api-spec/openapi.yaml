openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: articles
    description: Blog article operations
  - name: projects
    description: Portfolio project operations
  - name: analytics
    description: Site analytics and tracking
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /articles:
    get:
      operationId: listArticles
      tags: [articles]
      summary: List all articles
      parameters:
        - name: pillar
          in: query
          required: false
          schema:
            type: string
            enum: [BUILD, TEACH, INSPIRE, CONVERT]
        - name: published
          in: query
          required: false
          schema:
            type: string
            enum: ["true", "false"]
      responses:
        "200":
          description: List of articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Article"
    post:
      operationId: createArticle
      tags: [articles]
      summary: Create a new article
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateArticleBody"
      responses:
        "201":
          description: Created article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "400":
          description: Invalid input

  /articles/{id}:
    get:
      operationId: getArticle
      tags: [articles]
      summary: Get an article by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Article found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "404":
          description: Article not found
    patch:
      operationId: updateArticle
      tags: [articles]
      summary: Update an article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateArticleBody"
      responses:
        "200":
          description: Updated article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "404":
          description: Article not found
    delete:
      operationId: deleteArticle
      tags: [articles]
      summary: Delete an article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Article not found

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: [IoT, Domotique, Affichage, SmartCity, Formation]
        - name: featured
          in: query
          required: false
          schema:
            type: string
            enum: ["true", "false"]
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Invalid input

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Project not found
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectBody"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Project not found
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Project not found

  /analytics/pageview:
    post:
      operationId: trackPageView
      tags: [analytics]
      summary: Track a page view
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrackPageViewBody"
      responses:
        "201":
          description: Tracked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackPageViewResponse"

  /analytics/stats:
    get:
      operationId: getAnalyticsStats
      tags: [analytics]
      summary: Get overall analytics stats
      parameters:
        - name: days
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Analytics stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsStats"

  /analytics/pageviews:
    get:
      operationId: listPageViews
      tags: [analytics]
      summary: Get page views by path
      parameters:
        - name: days
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Page views list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PageViewStat"

  /analytics/daily:
    get:
      operationId: getDailyViews
      tags: [analytics]
      summary: Get daily visit counts for chart
      parameters:
        - name: days
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Daily view counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyViewCount"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Article:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: string
        content:
          type: string
        pillar:
          type: string
          enum: [BUILD, TEACH, INSPIRE, CONVERT]
        coverImage:
          type: ["string", "null"]
        published:
          type: boolean
        readingTime:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - slug
        - excerpt
        - content
        - pillar
        - coverImage
        - published
        - readingTime
        - createdAt
        - updatedAt

    CreateArticleBody:
      type: object
      properties:
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: string
        content:
          type: string
        pillar:
          type: string
          enum: [BUILD, TEACH, INSPIRE, CONVERT]
        coverImage:
          type: ["string", "null"]
        published:
          type: boolean
        readingTime:
          type: ["integer", "null"]
      required:
        - title
        - slug
        - excerpt
        - content
        - pillar

    UpdateArticleBody:
      type: object
      properties:
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: string
        content:
          type: string
        pillar:
          type: string
          enum: [BUILD, TEACH, INSPIRE, CONVERT]
        coverImage:
          type: ["string", "null"]
        published:
          type: boolean
        readingTime:
          type: ["integer", "null"]

    Project:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        description:
          type: string
        context:
          type: string
        problem:
          type: string
        solution:
          type: string
        techStack:
          type: string
        results:
          type: string
        category:
          type: string
          enum: [IoT, Domotique, Affichage, SmartCity, Formation]
        coverImage:
          type: ["string", "null"]
        metric:
          type: ["string", "null"]
        featured:
          type: boolean
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - slug
        - description
        - context
        - problem
        - solution
        - techStack
        - results
        - category
        - coverImage
        - metric
        - featured
        - status
        - createdAt
        - updatedAt

    CreateProjectBody:
      type: object
      properties:
        title:
          type: string
        slug:
          type: string
        description:
          type: string
        context:
          type: string
        problem:
          type: string
        solution:
          type: string
        techStack:
          type: string
        results:
          type: string
        category:
          type: string
          enum: [IoT, Domotique, Affichage, SmartCity, Formation]
        coverImage:
          type: ["string", "null"]
        metric:
          type: ["string", "null"]
        featured:
          type: boolean
        status:
          type: string
      required:
        - title
        - slug
        - description
        - context
        - problem
        - solution
        - techStack
        - results
        - category

    UpdateProjectBody:
      type: object
      properties:
        title:
          type: string
        slug:
          type: string
        description:
          type: string
        context:
          type: string
        problem:
          type: string
        solution:
          type: string
        techStack:
          type: string
        results:
          type: string
        category:
          type: string
          enum: [IoT, Domotique, Affichage, SmartCity, Formation]
        coverImage:
          type: ["string", "null"]
        metric:
          type: ["string", "null"]
        featured:
          type: boolean
        status:
          type: string

    TrackPageViewBody:
      type: object
      properties:
        path:
          type: string
        title:
          type: ["string", "null"]
        referrer:
          type: ["string", "null"]
      required:
        - path

    TrackPageViewResponse:
      type: object
      properties:
        id:
          type: integer
      required:
        - id

    AnalyticsStats:
      type: object
      properties:
        totalViews:
          type: integer
        uniquePages:
          type: integer
        todayViews:
          type: integer
        weekViews:
          type: integer
        topPage:
          type: ["string", "null"]
      required:
        - totalViews
        - uniquePages
        - todayViews
        - weekViews
        - topPage

    PageViewStat:
      type: object
      properties:
        path:
          type: string
        title:
          type: ["string", "null"]
        views:
          type: integer
        lastVisit:
          type: string
          format: date-time
      required:
        - path
        - title
        - views
        - lastVisit

    DailyViewCount:
      type: object
      properties:
        date:
          type: string
        views:
          type: integer
      required:
        - date
        - views
